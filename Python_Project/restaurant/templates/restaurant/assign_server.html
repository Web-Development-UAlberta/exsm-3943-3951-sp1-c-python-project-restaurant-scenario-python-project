{% extends 'base.html' %}
{% block title %}Assign Server{% endblock %}
{% block content %}
<h1>Assign Server to Order #{{ order.id }}</h1>

<form method="post">
    {% csrf_token %}
    <select name="server_id">
        {% for server in servers %}
            <option value="{{ server.id }}">{{ server.get_full_name|default:server.username }}</option>
        {% endfor %}
    </select>
    <button type="submit">Assign</button>
</form>
{% endblock %}
