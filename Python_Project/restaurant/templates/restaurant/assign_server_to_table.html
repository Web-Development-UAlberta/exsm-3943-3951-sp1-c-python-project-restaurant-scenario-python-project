{% extends 'base.html' %}

{% block title %}Assign Server to Table {{ table.label }}{% endblock %}

{% block content %}
<h1>Assign Server to Table {{ table.label }}</h1>

<p><strong>Current Table Status:</strong> {{ table.get_status_display }}</p>

<form method="post" style="margin-top: 20px;">
    {% csrf_token %}
    
    <label for="server_id"><strong>Select Server:</strong></label><br><br>
    <select name="server_id" id="server_id" required style="padding: 8px; width: 300px;">
        {% for server in servers %}
            <option value="{{ server.id }}">
                {{ server.get_full_name|default:server.username }} 
                ({{ server.get_role_display }})
            </option>
        {% endfor %}
    </select>
    
    <br><br>
    <button type="submit" style="padding: 10px 20px;">Assign Server</button>
    <a href="{% url 'server_host_view' %}" style="margin-left: 15px; color: #666;">Cancel</a>
</form>

{% endblock %}
