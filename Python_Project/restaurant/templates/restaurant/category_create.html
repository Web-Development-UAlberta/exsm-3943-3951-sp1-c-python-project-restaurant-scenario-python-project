{% extends 'base.html' %}

{% block title %}
    {% if form.instance.pk %} Edit Category {% else %} Add New Category {% endif %}
{% endblock%}

{% block content %}
<h1>{% if form.instance.pk %} Edit Category {% else %} Add New Category {% endif %}</h1>
<form method="post">
    {% csrf_token %}
    {{form.as_p}}
    <button type="submit">Save</button>
</form>
<a href="{% url 'category_list' %}">Cancel</a>
{% endblock %}
