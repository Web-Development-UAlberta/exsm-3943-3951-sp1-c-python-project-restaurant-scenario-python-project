{% extends 'base.html' %}

{% block title %}
    Category Details
{% endblock %}

{% block content %}
<h1>{{category.name}}</h1>
    <p>Created at: {{category.created_at}}</p>
   
    <a href="{% url 'category_edit' category.pk %}">Edit</a>
    
    <form action="{% url 'category_confirm_delete' category.pk%}" method="post">
        {% csrf_token %}
        <button type="submit">Delete</button>
    </form>

{% endblock %}
