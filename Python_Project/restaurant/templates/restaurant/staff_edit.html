{% extends 'base.html' %}

{% block title %}Edit {{ staff.get_full_name }} | Urban Spark{% endblock %}

{% block content %}

<div class="auth-box">
    <h2>Edit {{ staff.get_full_name|default:staff.username }}</h2>
    <p style="color: var(--sage-green); font-size: 0.85rem; margin-bottom: 1rem;">
        {{ staff.get_role_display }}
    </p>

    <form method="POST" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="auth-button">Save Changes</button>
    </form>

    <a href="{% url 'staff_detail' staff.pk %}" style="display:block; text-align:center; margin-top:1rem; font-size:0.9rem;">
        Cancel
    </a>
</div>

{% endblock %}
