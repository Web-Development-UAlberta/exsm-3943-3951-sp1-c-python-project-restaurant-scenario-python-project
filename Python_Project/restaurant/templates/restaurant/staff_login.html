{% extends 'base.html' %}

{% block title %}Staff Login | Urban Spark{% endblock %}

{% block content %}

    <div class="auth-box"> {# Will be using the names in the css file for editing #}
        <h2>Staff Login</h2>


        <form method="POST" class="auth-form">
            {% csrf_token %}
            <p>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </p>
            <p>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </p>
            <button type="submit" class="auth-button">Login</button>
        </form>

        <p class="auth-redirect">Don't have an account yet? <a href="{% url 'staff_signup' %}">Sign Up</a></p>
    </div>

{% endblock %}
