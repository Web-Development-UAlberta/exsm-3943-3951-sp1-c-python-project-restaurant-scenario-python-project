{% extends 'base.html' %}

{% block title %}
    Tables
{% endblock %}
 
{% block content %}
<ul>
    {% for table in tables %}
    <li>
        <a href="{% url 'table_detail' table.pk %}">{{table.label}}</a> 
        - {{table.seats}} - {{table.status}}  
    </li>
    {% endfor %}
</ul>
<a href="{% url 'table_create' restaurant_pk=restaurant.pk  %}">Add New Table</a>
{% endblock %}
